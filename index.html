<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>2026 釜山小王子隨身手冊</title>
    
    <!-- 引入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- 引入 React 與 ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- 引入 Babel (讓瀏覽器可以直接編譯 JSX) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- 引入 Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- 自訂 CSS 動畫與樣式 -->
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');
        body { 
            font-family: 'Noto Sans TC', sans-serif; 
            -webkit-tap-highlight-color: transparent;
            background-color: #fdfcf0;
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        @keyframes twinkle {
            0%, 100% { opacity: 0.1; transform: scale(0.8); }
            50% { opacity: 0.9; transform: scale(1.2); }
        }
        .star-twinkle {
            animation-name: twinkle;
            animation-iteration-count: infinite;
            animation-timing-function: ease-in-out;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const App = () => {
            const [activeTab, setActiveTab] = useState('itinerary');
            const [activeDay, setActiveDay] = useState(1);
            const [hkdInput, setHkdInput] = useState('');
            const [krwInput, setKrwInput] = useState('');
            const [fullscreenNote, setFullscreenNote] = useState(null);
            const exchangeRate = 185; 

            const [showModal, setShowModal] = useState(false);
            const [expenseType, setExpenseType] = useState('trans');
            const [expenseDesc, setExpenseDesc] = useState('');
            const [expenseCost, setExpenseCost] = useState('');

            // 初始化 Icons
            useEffect(() => {
                lucide.createIcons();
            });

            // 讀取 LocalStorage
            const [transportEx, setTransportEx] = useState(() => {
                try {
                    const saved = localStorage.getItem('busan_trans_final_app');
                    return saved ? JSON.parse(saved) : [];
                } catch(e) { return []; }
            });
            const [shoppingEx, setShoppingEx] = useState(() => {
                try {
                    const saved = localStorage.getItem('busan_shop_final_app');
                    return saved ? JSON.parse(saved) : [];
                } catch(e) { return []; }
            });

            // 寫入 LocalStorage
            useEffect(() => {
                localStorage.setItem('busan_trans_final_app', JSON.stringify(transportEx));
                localStorage.setItem('busan_shop_final_app', JSON.stringify(shoppingEx));
            }, [transportEx, shoppingEx]);

            const convertHkdToKrw = (val) => {
                setHkdInput(val);
                if (val === '') setKrwInput('');
                else setKrwInput((parseFloat(val) * exchangeRate).toFixed(0));
            };

            const convertKrwToHkd = (val) => {
                setKrwInput(val);
                if (val === '') setHkdInput('');
                else setHkdInput((parseFloat(val) / exchangeRate).toFixed(2));
            };

            const openExpenseModal = (type) => {
                setExpenseType(type);
                setExpenseDesc('');
                setExpenseCost('');
                setShowModal(true);
            };

            const saveExpense = () => {
                if (expenseDesc.trim() && expenseCost) {
                    const newItem = { id: Date.now(), desc: expenseDesc, cost: parseInt(expenseCost) };
                    if (expenseType === 'trans') setTransportEx([...transportEx, newItem]);
                    else setShoppingEx([...shoppingEx, newItem]);
                    setShowModal(false);
                }
            };

            const deleteExpense = (type, id) => {
                if (type === 'trans') setTransportEx(transportEx.filter(i => i.id !== id));
                else setShoppingEx(shoppingEx.filter(i => i.id !== id));
            };

            const totalTrans = transportEx.reduce((a, c) => a + c.cost, 0);
            const totalShop = shoppingEx.reduce((a, c) => a + c.cost, 0);
            const totalAll = totalTrans + totalShop;

            const getNaverMapUrl = (query) => {
                return `https://m.map.naver.com/search2/search.naver?query=${encodeURIComponent(query)}`;
            };

            // 韓語語音播放功能
            const playKoreanVoice = (text, e) => {
                if (e) e.stopPropagation();
                if ('speechSynthesis' in window) {
                    window.speechSynthesis.cancel();
                    const utterance = new SpeechSynthesisUtterance(text);
                    utterance.lang = 'ko-KR';
                    utterance.rate = 0.85; 
                    window.speechSynthesis.speak(utterance);
                }
            };

            const itinerary = {
                1: {
                date: "04/25 (六)", title: "🛫 香港 ➡️ 海雲台 ➡️ 廣安里",
                items: [
                    { time: "00:55", desc: "香港機場 T1 集合" },
                    { time: "02:55", desc: "起飛 - 德威航空 TW640" },
                    { time: "07:25", desc: "抵達金海國際機場 (航班：TW640)" },
                    { time: "08:30", desc: "去海雲台酒店：W公寓酒店", taxi: "約 ₩25,000 (約 45 分鐘)", loc: "W Apartment Haeundae" },
                    { time: "09:00", desc: "早餐" },
                    { time: "10:30", desc: "Club D Oasis 汗蒸幕 (VBP #1)", taxi: "約 ₩4,800 (約 5 分鐘直達)", loc: "클럽디 오아시스" },
                    { time: "13:30", desc: "午餐：海雲台傳聞中人蔘雞", note: "步行至中洞商圈", loc: "해운대 소문난삼계탕" },
                    { time: "15:00", desc: "Check In" },
                    { time: "16:00", desc: "海雲台購物" },
                    { time: "17:00", desc: "去遊艇服務處", taxi: "約 ₩8,000 (約 20 分鐘)", loc: "광안리해양레포츠센터", note: "地址: 부산 수영구 광안해변로54번길 222" },
                    { time: "18:00", desc: "抵達遊艇服務處登記" },
                    { time: "18:30", desc: "Yacht Holic 遊艇體驗 (已預約)" },
                    { time: "20:00", desc: "廣安里無人機表演" },
                    { time: "21:30", desc: "宵夜：60 炸雞 (海雲台店)", taxi: "回程約 ₩8,000 (約 20 分鐘)", note: "推薦 CCC 脆皮口味", loc: "60계치킨 해운대점" }
                ]},
                2: {
                date: "04/26 (日)", title: "🚃 海岸列車 ➡️ 龍宮寺 ➡️ 膠囊火車",
                items: [
                    { time: "11:00", desc: "早午餐：海木 (Haemok) 鰻魚飯", note: "建議 10:30 現場取號", loc: "해목 해운대점" },
                    { time: "13:00", desc: "海岸列車 (尾浦 ➜ 松亭)", note: "持 VBP 兌換或現場購票", loc: "해운대블루라인파크 미포정거장" },
                    { time: "14:30", desc: "海東龍宮寺", taxi: "松亭出發約 ₩6,000 (約 10 分鐘)", loc: "해동용궁사" },
                    { time: "16:15", desc: "DIART Coffee (青沙浦)", taxi: "龍宮寺出發約 ₩6,000 (約 15 分鐘)", note: "休息避開人潮", loc: "디아트커피" },
                    { time: "17:15", desc: "青沙浦站排隊準備", note: "建議預留 45 分鐘排隊驗票" },
                    { time: "18:00", desc: "膠囊小火車 (青沙浦 ➜ 尾浦)", note: "已預約，看夕陽時間" },
                    { time: "19:30", desc: "晚餐：味贊王/廣安木/伍班長", loc: "맛찬들왕소금구이 해운대점" }
                ]},
                3: {
                date: "04/27 (一)", title: "🏎️ Skyline Luge ➡️ 樂天世界",
                items: [
                    { time: "10:00", desc: "早餐" },
                    { time: "11:30", desc: "Skyline Luge (VBP #2)", taxi: "海雲台出發約 ₩18,000 (約 25 分鐘)", loc: "스카이라인 루지 부산" },
                    { time: "13:00", desc: "樂天 Outlet 購物 & 午餐", note: "內有 EPT 專櫃 (步行前往)", loc: "롯데프리미엄아울렛 동부산점" },
                    { time: "16:00", desc: "樂天世界 (VBP #3)", note: "童話城堡、看遊行 (步行前往)", loc: "롯데월드 어드벤처 부산" },
                    { time: "19:00", desc: "晚餐：Gojip 烤牛肋骨", taxi: "樂天出發約 ₩6,000 (約 15 分鐘)", loc: "고짚 기장점" },
                    { time: "21:00", desc: "回酒店", taxi: "直回海雲台約 ₩15,000 (約 30 分鐘)" }
                ]},
                4: {
                date: "04/28 (二)", title: "🦊 甘川洞 ➡️ 影島 ➡️ 南浦洞",
                items: [
                    { time: "10:00", desc: "甘川洞文化村 (小王子)", taxi: "海雲台直達約 ₩25,000 (約 45 分鐘)", loc: "감천문화마을" },
                    { time: "12:30", desc: "白淺灘文化村", taxi: "甘川出發約 ₩7,000 (約 15 分鐘)", note: "影島海景咖啡廳拍照", loc: "흰여울문화마을" },
                    { time: "14:30", desc: "太宗台", taxi: "白淺灘出發約 ₩8,000 (約 20 分鐘)", note: "需另購 Danubi 列車票", loc: "태종대 유원지" },
                    { time: "16:00", desc: "龍頭山公園", taxi: "太宗台出發約 ₩10,000 (約 25 分鐘)", note: "從南浦洞步行街搭扶梯直達山頂", loc: "용두산공원" },
                    { time: "17:00", desc: "南浦洞購物 (ABC Mart / OY)", note: "搭扶梯下山後就是商圈核心", loc: "남포동거리" },
                    { time: "19:00", desc: "富平罐頭市場", note: "Milgot (밀곳) 購買艾草糕", loc: "부평깡통시장" },
                    { time: "19:30", desc: "晚餐：富平豬蹄街", note: "就在罐頭市場隔壁，推薦涼拌豬蹄", loc: "부산 부평족발골목" },
                    { time: "21:00", desc: "回酒店", taxi: "南浦洞直回約 ₩20,000 (約 40 分鐘)" }
                ]},
                5: {
                date: "04/29 (三)", title: "🚠 松島纜車 ➡️ X the Sky ➡️ 機場",
                items: [
                    { time: "09:30", desc: "Moving Photo 報紙自拍店 📷", taxi: "海雲台出發約 ₩22,000 (約 40 分鐘)", note: "纜車馬路對面。VBP折₩2,000。建議先拍成品更有氛圍！", loc: "무빙포토 송도해상케이블카점" },
                    { time: "10:30", desc: "松島海上纜車 (VBP #4)", note: "1樓換票→4樓搭乘。水晶來回₩22k，人多需共乘(最多8人)", loc: "송도해상케이블카" },
                    { time: "11:30", desc: "松島龍宮雲橋 (VBP #5)", note: "位於纜車下站對面 (步行)", loc: "송도용궁구름다리" },
                    { time: "12:30", desc: "回海雲台", taxi: "松島出發約 ₩22,000 (約 40 分鐘)" },
                    { time: "13:30", desc: "午餐：風川灣淡水鰻魚", note: "海雲台 LCT 附近，現點現烤", loc: "풍천만 해운대점" },
                    { time: "15:30", desc: "Busan X the Sky (100 樓景觀)", note: "全球最高 Starbucks", loc: "부산엑스더스카이" },
                    { time: "17:30", desc: "酒店取行李" },
                    { time: "19:30", desc: "到達金海機場", taxi: "海雲台出發約 ₩25,000 (約 50 分鐘)", note: "航班：TW639，21:50 起飛" }
                ]}
            };

            const taxiNotes = [
                { t: "🧾 索取收據", k: "영수증 주세요", d: "請給我收據。" },
                { t: "🦊 甘川洞文化村 (最頂端)", k: "기사님, 감천문화마을 '어린왕자 포토존' 가까운 위쪽 도로에서 내려주세요.", d: "司機先生，請在靠近「小王子拍照區」上方的馬路讓我下車。" },
                { t: "🌊 影島白淺灘文化村", k: "기사님, 위쪽 큰길 '흰여울 안내소' 근처에서 내려주세요.", d: "司機先生，請在上方大馬路的「白淺灘詢問處」附近讓我下車。" },
                { t: "⛩️ 海東龍宮寺", k: "기사님, 해동용궁사 주차장 안쪽 입구까지 최대한 가까이 가주세요.", d: "司機先生，請盡量幫我開到海東龍宮寺停車場最裡面的入口處。" },
                { t: "🚠 松島海上纜車", k: "기사님, 송도해상케이블카 '송도베이스테이션' 입구로 가주세요.", d: "司機先生，請前往松島海上纜車「松島灣站」入口。" },
                { t: "🏨 返回海雲台飯店", k: "기사님, 해운대 W 레지던스 (W Apartment) 호텔로 가주세요.", d: "司機先生，請前往海雲台 W 公寓酒店。謝謝。" }
            ];

            return (
                <div className="min-h-screen text-[#1a2b4c] pb-[100px] relative overflow-x-hidden">
                    
                    {/* 淡淡慢閃的背景星星 */}
                    <div className="fixed inset-0 pointer-events-none z-0 overflow-hidden opacity-50">
                        {[...Array(15)].map((_, i) => (
                            <div key={`bg-star-${i}`} className="absolute text-blue-200 star-twinkle" 
                                style={{ top: `${Math.random() * 100}%`, left: `${Math.random() * 100}%`, fontSize: `${Math.random() * 6 + 4}px`, animationDelay: `${Math.random() * 5}s`, animationDuration: `${Math.random() * 4 + 3}s` }}>✦</div>
                        ))}
                    </div>

                    {/* 經典深藍與亮黃標題區 */}
                    <div className="relative h-48 bg-[#1a2b4c] flex flex-col items-center justify-center overflow-hidden z-10">
                        <div className="absolute inset-0">
                            {[...Array(25)].map((_, i) => (
                                <div key={`header-star-${i}`} className="absolute text-[#fcd34d] star-twinkle opacity-70" 
                                    style={{ top: `${Math.random() * 100}%`, left: `${Math.random() * 100}%`, fontSize: `${Math.random() * 8 + 6}px`, animationDelay: `${Math.random() * 3}s`, animationDuration: `${Math.random() * 3 + 2}s` }}>✦</div>
                            ))}
                        </div>
                        <div className="z-10 text-center flex flex-col items-center">
                            <h1 className="text-3xl font-black text-white tracking-[0.2em] mb-2 flex items-center gap-2">
                                🌟 BUSAN 2026 🌟
                            </h1>
                            <p className="text-[#fcd34d] text-xs font-bold tracking-[0.4em] uppercase">The Little Prince</p>
                        </div>
                    </div>

                    {/* 匯率區 */}
                    <div className="px-5 -mt-6 relative z-20">
                        <div className="bg-white rounded-2xl shadow-lg p-4 border border-gray-100">
                            <div className="flex items-center justify-between mb-3">
                                <span className="text-[10px] font-black text-gray-400 uppercase tracking-widest flex items-center gap-1">
                                    <i data-lucide="calculator" className="w-3.5 h-3.5 text-[#fcd34d]"></i> 匯率 (1 HKD = 185 KRW)
                                </span>
                            </div>
                            <div className="flex items-center gap-2">
                                <div className="flex-1 bg-gray-50 rounded-xl p-2.5 border border-gray-100">
                                    <p className="text-[10px] font-black text-gray-400 mb-0.5 text-center">HKD 🇭🇰</p>
                                    <input type="number" value={hkdInput} onChange={(e) => convertHkdToKrw(e.target.value)} className="w-full text-center text-xl font-black text-[#1a2b4c] bg-transparent focus:outline-none" placeholder="0"/>
                                </div>
                                <i data-lucide="arrow-left-right" className="w-4 h-4 text-gray-300 shrink-0"></i>
                                <div className="flex-1 bg-blue-50 rounded-xl p-2.5 border border-blue-100">
                                    <p className="text-[10px] font-black text-blue-400 mb-0.5 text-center">KRW 🇰🇷</p>
                                    <input type="number" value={krwInput} onChange={(e) => convertKrwToHkd(e.target.value)} className="w-full text-center text-xl font-black text-blue-600 bg-transparent focus:outline-none" placeholder="0"/>
                                </div>
                            </div>
                        </div>
                    </div>

                    {/* 導航選單 */}
                    <div className="mt-5 px-5 relative z-10">
                        <div className="flex bg-white rounded-xl p-1 mb-5 border border-gray-200 shadow-sm">
                            <button onClick={() => setActiveTab('itinerary')} className={`flex-1 py-2.5 text-sm font-black rounded-lg transition-all flex items-center justify-center gap-1.5 ${activeTab === 'itinerary' ? 'bg-[#1a2b4c] text-white shadow-md' : 'text-gray-400'}`}>📅 行程</button>
                            <button onClick={() => setActiveTab('taxi')} className={`flex-1 py-2.5 text-sm font-black rounded-lg transition-all flex items-center justify-center gap-1.5 ${activeTab === 'taxi' ? 'bg-[#1a2b4c] text-white shadow-md' : 'text-gray-400'}`}>🚕 的士</button>
                            <button onClick={() => setActiveTab('expense')} className={`flex-1 py-2.5 text-sm font-black rounded-lg transition-all flex items-center justify-center gap-1.5 ${activeTab === 'expense' ? 'bg-[#1a2b4c] text-white shadow-md' : 'text-gray-400'}`}>📒 記帳</button>

                                <div className="bg-white rounded-3xl p-5 shadow-sm border border-gray-100">

                                    </div>

                                    <div className="space-y-7 relative">

                                                    <span className="text-[12px] font-black leading-none">{item.time.split(':')[0]}</span>

                                                    {item.loc ? (

                                                            <i data-lucide="map-pin" className="w-3.5 h-3.5 ml-1.5 text-blue-400 shrink-0 inline-block"></i>
                                                        </a>
                                                    ) : (
                                                        <span className="text-[16px] font-black leading-snug tracking-tight flex items-center flex-wrap text-[#1a2b4c]">

                                                    {item.taxi && (
                                                        <div className="mt-2.5 flex items-center gap-1.5 text-[10px] font-black text-blue-600 bg-blue-50 px-3 py-1.5 rounded-lg border border-blue-100 w-fit">
                                                            <i data-lucide="navigation" className="w-3 h-3 shrink-0"></i> {item.taxi}
                                                        </div>
                                                    )}
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* 的士字條分頁 */}
                        {activeTab === 'taxi' && (
                            <div className="space-y-4">
                                <div className="bg-blue-50 p-4 rounded-xl border border-blue-100 flex items-start gap-2 mb-2">
                                    <i data-lucide="info" className="w-4 h-4 text-blue-600 flex-shrink-0 mt-0.5"></i>
                                    <p className="text-xs text-blue-800 font-bold">💡 點擊「小喇叭」可直接播放韓語發音；點擊「卡片」可進入大字螢幕模式。</p>
                                </div>
                                {taxiNotes.map((note, idx) => (
                                    <div key={idx} onClick={() => setFullscreenNote(note)} className="bg-white rounded-2xl p-5 border border-gray-200 shadow-sm active:bg-gray-50 transition-colors cursor-pointer relative">
                                        <p className="text-[10px] font-black text-gray-400 mb-3 uppercase tracking-widest">{note.t}</p>
                                        <div className="bg-[#1a2b4c] p-5 rounded-xl mb-3 shadow-inner relative overflow-hidden">
                                            <div className="absolute top-2 right-3 text-[#fcd34d] opacity-30 text-xs">✦</div>
                                            <p className="text-xl font-bold text-white text-center leading-relaxed pr-8">"{note.k}"</p>
                                            <button onClick={(e) => playKoreanVoice(note.k, e)} className="absolute right-3 top-1/2 transform -translate-y-1/2 p-2.5 bg-white/20 rounded-full hover:bg-white/30 active:scale-90 transition-all text-[#fcd34d]">
                                                <i data-lucide="volume-2" className="w-5 h-5"></i>
                                            </button>
                                        </div>
                                        <div className="flex justify-between items-center mt-2">
                                            <p className="text-sm text-gray-600 font-bold w-[85%]">{note.d}</p>
                                            <i data-lucide="chevron-right" className="w-4 h-4 text-gray-300"></i>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}

                        {/* 記帳分頁 */}
                        {activeTab === 'expense' && (
                            <div className="space-y-5">
                                <div className="bg-white rounded-2xl p-5 shadow-sm border border-gray-100">
                                    <div className="flex justify-between items-center mb-4">
                                        <h3 className="font-black text-[#1a2b4c] flex items-center gap-2"><i data-lucide="navigation" className="w-4 h-4 text-blue-500"></i> 🚕 交通/的士</h3>
                                        <button onClick={() => openExpenseModal('trans')} className="bg-[#1a2b4c] text-white p-2 rounded-xl shadow-md active:scale-95 transition-transform"><i data-lucide="plus" className="w-4 h-4"></i></button>
                                    </div>
                                    <div className="space-y-2.5">
                                        {transportEx.length === 0 && <p className="text-center text-gray-400 text-xs py-2">尚無紀錄</p>}
                                        {transportEx.map(item => (
                                            <div key={item.id} className="flex justify-between items-center bg-gray-50 p-3.5 rounded-xl border border-gray-100">
                                                <span className="text-sm font-bold text-gray-700">{item.desc}</span>
                                                <div className="flex items-center gap-3">
                                                    <span className="text-sm font-black text-blue-600">₩{item.cost.toLocaleString()}</span>
                                                    <button onClick={() => deleteExpense('trans', item.id)} className="text-red-400 p-1"><i data-lucide="trash-2" className="w-4 h-4"></i></button>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                                <div className="bg-white rounded-2xl p-5 shadow-sm border border-gray-100">
                                    <div className="flex justify-between items-center mb-4">
                                        <h3 className="font-black text-[#1a2b4c] flex items-center gap-2"><i data-lucide="shopping-bag" className="w-4 h-4 text-pink-500"></i> 🛍️ 購物/美食</h3>
                                        <button onClick={() => openExpenseModal('shop')} className="bg-pink-600 text-white p-2 rounded-xl shadow-md active:scale-95 transition-transform"><i data-lucide="plus" className="w-4 h-4"></i></button>
                                    </div>
                                    <div className="space-y-2.5">
                                        {shoppingEx.length === 0 && <p className="text-center text-gray-400 text-xs py-2">尚無紀錄</p>}
                                        {shoppingEx.map(item => (
                                            <div key={item.id} className="flex justify-between items-center bg-gray-50 p-3.5 rounded-xl border border-gray-100">
                                                <span className="text-sm font-bold text-gray-700">{item.desc}</span>
                                                <div className="flex items-center gap-3">
                                                    <span className="text-sm font-black text-pink-600">₩{item.cost.toLocaleString()}</span>
                                                    <button onClick={() => deleteExpense('shop', item.id)} className="text-red-400 p-1"><i data-lucide="trash-2" className="w-4 h-4"></i></button>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        )}
                    </div>

                    {/* 緊湊底部面板 */}
                    <div className="fixed bottom-0 left-0 right-0 z-[100] shadow-[0_-10px_20px_rgba(0,0,0,0.05)]">
                        <div className="bg-[#1a2b4c] text-white px-5 py-1.5 flex justify-between items-center border-t border-[#1a2b4c]">
                            <div className="flex items-center gap-1.5">
                                <div className="bg-[#fcd34d] p-1 rounded text-[#1a2b4c]"><i data-lucide="star" className="w-3 h-3 fill-current"></i></div>
                                <div className="flex items-baseline gap-2">
                                    <span className="text-[8px] font-black text-white/60 uppercase tracking-widest">Total Spent</span>
                                    <span className="text-[15px] font-black tracking-tight">₩{totalAll.toLocaleString()}</span>
                                </div>
                            </div>
                            <div className="flex items-baseline gap-1.5">
                                <span className="text-[8px] font-black text-[#fcd34d]/80 uppercase tracking-widest">HKD Approx</span>
                                <span className="text-[15px] font-black tracking-tight">${(totalAll/185).toFixed(0)}</span>
                            </div>
                        </div>
                        <div className="h-14 bg-white flex items-center justify-around border-t border-gray-200">
                            <button onClick={() => setActiveTab('itinerary')} className={`flex flex-col items-center gap-0.5 flex-1 ${activeTab === 'itinerary' ? 'text-[#1a2b4c]' : 'text-gray-400'}`}>
                                <i data-lucide="calendar" className="w-[18px] h-[18px]"></i>
                                <span className="text-[9px] font-bold">行程</span>
                            </button>
                            <button onClick={() => setActiveTab('taxi')} className={`flex flex-col items-center gap-0.5 flex-1 ${activeTab === 'taxi' ? 'text-[#1a2b4c]' : 'text-gray-400'}`}>
                                <i data-lucide="navigation" className="w-[18px] h-[18px]"></i>
                                <span className="text-[9px] font-bold">的士</span>
                            </button>
                            <button onClick={() => setActiveTab('expense')} className={`flex flex-col items-center gap-0.5 flex-1 ${activeTab === 'expense' ? 'text-[#1a2b4c]' : 'text-gray-400'}`}>
                                <i data-lucide="credit-card" className="w-[18px] h-[18px]"></i>
                                <span className="text-[9px] font-bold">記帳</span>
                            </button>
                        </div>
                    </div>

                    {/* 記帳 Modal */}
                    {showModal && (
                        <div className="fixed inset-0 bg-[#1a2b4c]/80 backdrop-blur-sm z-[400] flex items-center justify-center p-5">
                            <div className="bg-white w-full max-w-sm rounded-3xl p-6 shadow-2xl">
                                <h3 className="text-xl font-black text-[#1a2b4c] mb-6">
                                    {expenseType === 'trans' ? '🚕 新增交通支出' : '🛍️ 新增購物美食支出'}
                                </h3>
                                <div className="space-y-4">
                                    <div>
                                        <label className="text-[11px] font-black text-gray-400 uppercase mb-1 block">項目名稱</label>
                                        <input type="text" value={expenseDesc} onChange={e => setExpenseDesc(e.target.value)} placeholder={expenseType === 'trans' ? '例如：往龍宮寺的士' : '例如：富平夜市豬蹄'} className="w-full bg-gray-50 border border-gray-200 rounded-xl px-4 py-3 text-sm font-bold text-gray-800 focus:outline-none focus:border-[#1a2b4c]" />
                                    </div>
                                    <div>
                                        <label className="text-[11px] font-black text-gray-400 uppercase mb-1 block">金額 (KRW)</label>
                                        <input type="number" value={expenseCost} onChange={e => setExpenseCost(e.target.value)} placeholder="0" className="w-full bg-gray-50 border border-gray-200 rounded-xl px-4 py-3 text-lg font-black text-[#1a2b4c] focus:outline-none focus:border-[#1a2b4c]" />
                                    </div>
                                </div>
                                <div className="flex gap-3 mt-8">
                                    <button onClick={() => setShowModal(false)} className="flex-1 py-3 bg-gray-100 text-gray-600 rounded-xl font-black">取消</button>
                                    <button onClick={saveExpense} className={`flex-1 py-3 text-white rounded-xl font-black ${expenseType === 'trans' ? 'bg-[#1a2b4c]' : 'bg-pink-600'}`}>儲存紀錄</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* 的士全螢幕模式 */}
                    {fullscreenNote && (
                        <div className="fixed inset-0 bg-[#1a2b4c] z-[300] flex flex-col items-center justify-center p-8" onClick={() => setFullscreenNote(null)}>
                            <div className="absolute inset-0 overflow-hidden pointer-events-none">
                                {[...Array(20)].map((_, i) => (
                                    <div key={`modal-star-${i}`} className="absolute text-[#fcd34d] star-twinkle opacity-50" style={{ top: `${Math.random() * 100}%`, left: `${Math.random() * 100}%`, fontSize: `${Math.random() * 10 + 5}px`, animationDelay: `${Math.random() * 2}s`, animationDuration: `${Math.random() * 3 + 2}s` }}>✦</div>
                                ))}
                            </div>
                            <button className="absolute top-8 right-8 p-4 text-white/50 z-20"><i data-lucide="x" className="w-10 h-10"></i></button>
                            <div className="w-full text-center space-y-10 z-10">
                                <p className="text-[#fcd34d] text-lg font-black tracking-widest uppercase">{fullscreenNote.t}</p>
                                <div className="bg-white/10 rounded-3xl p-8 border border-white/20 backdrop-blur-md shadow-2xl">
                                    <p className="text-4xl font-black text-white leading-snug break-words">{fullscreenNote.k}</p>
                                </div>
                                <button onClick={(e) => playKoreanVoice(fullscreenNote.k, e)} className="mx-auto flex items-center justify-center gap-3 bg-[#fcd34d] text-[#1a2b4c] px-8 py-4 rounded-full font-black text-xl shadow-lg active:scale-95 transition-transform">
                                    <i data-lucide="volume-2" className="w-6 h-6"></i> 播放語音給司機聽
                                </button>
                                <p className="text-gray-300 text-xl font-bold">{fullscreenNote.d}</p>
                                <p className="text-gray-500 text-sm mt-10 animate-bounce">👆 點擊螢幕其他空白處關閉</p>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
