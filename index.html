                    { time: "10:30", desc: "松島海上纜車 (VBP #4)", note: "水晶來回₩22k。☔ 一般雨天照常行駛，雨景別有風情。", loc: "송도해상케이블카" },
                    { time: "11:30", desc: "松島龍宮雲橋 (VBP #5)", note: "☔ 若風大雨大會關閉，可改在纜車對岸喝咖啡。", loc: "송도용궁구름다리" },
                    { time: "12:30", desc: "回海雲台", taxi: "松島出發約 ₩22,000 (約 40 分鐘)" },
                    { time: "13:30", desc: "午餐：風川灣淡水鰻魚", note: "海雲台 LCT 附近，現點現烤", loc: "풍천만 해운대점" },
                    { time: "15:30", desc: "Busan X the Sky ☕", note: "☔ 100樓 Starbucks。若遇濃霧無景觀，可改逛旁邊的 LCT Mall。", loc: "부산엑스더스카이" },
                    { time: "17:30", desc: "酒店取行李" },
                    { time: "19:30", desc: "到達金海機場", taxi: "海雲台出發約 ₩25,000 (約 50 分鐘)", note: "航班：TW639，21:50 起飛" }
                ]}
            };

            const taxiNotes = [
                { t: "🧾 索取收據", k: "영수증 주세요", d: "請給我收據。" },
                { t: "🛍️ 樂天百貨釜山總店 (西面)", k: "기사님, 서면 롯데백화점 부산본점으로 가주세요.", d: "司機先生，請前往西面的樂天百貨釜山總店。" },
                { t: "🦊 甘川洞文化村 (最頂端)", k: "기사님, 감천문화마을 '어린왕자 포토존' 가까운 위쪽 도로에서 내려주세요.", d: "司機先生，請在靠近「小王子拍照區」上方的馬路讓我下車。" },
                { t: "🌊 影島白淺灘文化村", k: "기사님, 위쪽 큰길 '흰여울 안내소' 근처에서 내려주세요.", d: "司機先生，請在上方大馬路的「白淺灘詢問處」附近讓我下車。" },
                { t: "⛩️ 海東龍宮寺", k: "기사님, 해동용궁사 주차장 안쪽 입구까지 최대한 가까이 가주세요.", d: "司機先生，請盡量幫我開到海東龍宮寺停車場最裡面的入口處。" },
                { t: "🚠 松島海上纜車", k: "기사님, 송도해상케이블카 '송도베이스테이션' 입구로 가주세요.", d: "司機先生，請前往松島海上纜車「松島灣站」入口。" },
                { t: "🏨 返回海雲台飯店", k: "기사님, 해운대 W 레지던스 (W Apartment) 호텔로 가주세요.", d: "司機先生，請前往海雲台 W 公寓酒店。謝謝。" }
            ];

            const koreanPhrases = [
                { t: "🌟 追星：買便當", k: "김재중 함박정식 도시락 있나요?", d: "請問有金在中代言的那個漢堡排便當嗎？" },
                { t: "🌟 追星：買米酒", k: "벚꽃 에디션 막걸리 재고 있나요?", d: "請問櫻花版米酒還有貨嗎？" },
                { t: "🧳 住宿與行李", k: "짐을 좀 맡길 수 있을까요?", d: "請問可以幫我寄存行李嗎？" },
                { t: "☕ 咖啡廳點餐", k: "아이스 아메리카노 한 잔 주세요.", d: "請給我一杯冰美式咖啡。" },
                { t: "🍽️ 餐廳用餐", k: "메뉴판 좀 주시겠어요?", d: "請問可以給我菜單嗎？" },
                { t: "🌶️ 餐廳用餐", k: "덜 맵게 해주세요.", d: "請幫我做微辣 (不要太辣)。" },
                { t: "💧 餐廳用餐", k: "물 좀 주세요.", d: "請給我一點水。" },
                { t: "💰 購物結帳", k: "이거 얼마예요?", d: "請問這個多少錢？" },
                { t: "🛍️ 購物退稅", k: "텍스프리 되나요?", d: "請問這裡可以退稅嗎 (Tax Free)？" },
                { t: "🚽 尋找設施", k: "화장실이 어디예요?", d: "請問洗手間在哪裡？" },
                { t: "📸 請求幫忙", k: "사진 좀 찍어주시겠어요?", d: "請問可以幫我們拍張照嗎？" },
                { t: "🚨 緊急情況", k: "경찰 좀 불러주세요!", d: "請幫我報警！" },
                { t: "🚑 緊急情況", k: "구급차 좀 불러주세요!", d: "請幫我叫救護車！" }
            ];

            return (
                <div className="min-h-screen text-[#1a2b4c] pb-[100px] relative overflow-x-hidden">
                    
                    {toastMsg && (
                        <div className="fixed z-[600] left-1/2 -translate-x-1/2 bg-gray-900/90 backdrop-blur-md text-white px-6 py-3 rounded-full font-black text-sm shadow-2xl toast-animate flex items-center gap-2">
                            {toastMsg}
                        </div>
                    )}

                    <div className="fixed inset-0 pointer-events-none z-0 overflow-hidden opacity-50">
                        {[...Array(15)].map((_, i) => (
                            <div key={`bg-star-${i}`} className="absolute text-blue-200 star-twinkle" 
                                style={{ top: `${Math.random() * 100}%`, left: `${Math.random() * 100}%`, fontSize: `${Math.random() * 6 + 4}px`, animationDelay: `${Math.random() * 5}s`, animationDuration: `${Math.random() * 4 + 3}s` }}>✦</div>
                        ))}
                    </div>

                    <div className="relative h-44 bg-[#1a2b4c] flex flex-col items-center justify-center overflow-hidden z-10">
                        <div className="absolute inset-0">
                            {[...Array(25)].map((_, i) => (
                                <div key={`header-star-${i}`} className="absolute text-[#fcd34d] star-twinkle opacity-70" 
                                    style={{ top: `${Math.random() * 100}%`, left: `${Math.random() * 100}%`, fontSize: `${Math.random() * 8 + 6}px`, animationDelay: `${Math.random() * 3}s`, animationDuration: `${Math.random() * 3 + 2}s` }}>✦</div>
                            ))}
                        </div>
                        <div className="z-10 text-center flex flex-col items-center">
                            <h1 className="text-3xl font-black text-white tracking-[0.2em] mb-1 flex items-center gap-2">
                                🌟 BUSAN 2026 🌟
                            </h1>
                            <p className="text-[#fcd34d] text-xs font-bold tracking-[0.4em] uppercase">The Little Prince</p>
                        </div>
                    </div>

                    <div className="px-5 -mt-6 relative z-20">
                        <div className="bg-white rounded-2xl shadow-lg p-3.5 border border-gray-100">
                            <div className="flex items-center gap-2">
                                <div className="flex-1 bg-gray-50 rounded-xl p-2 border border-gray-100">
                                    <p className="text-[10px] font-black text-gray-400 mb-0.5 text-center">HKD 🇭🇰</p>
                                    <input type="number" value={hkdInput} onChange={(e) => convertHkdToKrw(e.target.value)} className="w-full text-center text-lg font-black text-[#1a2b4c] bg-transparent focus:outline-none" placeholder="0"/>
                                </div>
                                <div className="flex flex-col items-center justify-center">
                                    <i data-lucide="arrow-left-right" className="w-3.5 h-3.5 text-gray-300"></i>
                                    <span className="text-[8px] font-bold text-gray-400 mt-0.5">1:185</span>
                                </div>
                                <div className="flex-1 bg-blue-50 rounded-xl p-2 border border-blue-100">
                                    <p className="text-[10px] font-black text-blue-400 mb-0.5 text-center">KRW 🇰🇷</p>
                                    <input type="number" value={krwInput} onChange={(e) => convertKrwToHkd(e.target.value)} className="w-full text-center text-lg font-black text-blue-600 bg-transparent focus:outline-none" placeholder="0"/>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div className="mt-5 px-4 relative z-10">
                        <div className="flex bg-white rounded-xl p-1.5 mb-5 border border-gray-200 shadow-sm overflow-x-auto no-scrollbar smooth-scroll gap-1.5">
                            {['itinerary', 'taxi', 'places', 'expense', 'info', 'phrase'].map((tab) => (
                                <button key={tab} onClick={() => setActiveTab(tab)} className={`flex-shrink-0 min-w-[72px] px-2 py-3 text-xs sm:text-sm font-black rounded-lg transition-all flex items-center justify-center gap-1.5 ${activeTab === tab ? 'bg-[#1a2b4c] text-white shadow-md' : 'text-gray-400'}`}>
                                    {tab === 'itinerary' ? '📅 行程' : tab === 'taxi' ? '🚕 的士' : tab === 'places' ? '📍 地點' : tab === 'expense' ? '📒 記帳' : tab === 'info' ? '☁️ 實用' : '🗣️ 韓語'}
                                </button>
                            ))}
                        </div>

                        {activeTab === 'itinerary' && (
                            <div className="space-y-4">
                                <div className="flex space-x-2 overflow-x-auto pb-2 no-scrollbar smooth-scroll">
                                    {[1, 2, 3, 4, 5].map(day => (
                                        <button key={day} onClick={() => setActiveDay(day)} className={`flex-shrink-0 w-16 py-2.5 rounded-xl text-sm font-black transition-all border-2 ${activeDay === day ? 'bg-[#fcd34d] border-[#fcd34d] text-[#1a2b4c] shadow-md' : 'bg-white border-gray-200 text-gray-400'}`}>
                                            Day {day}
                                        </button>
                                    ))}
                                </div>

                                <div className="bg-white rounded-3xl p-5 shadow-sm border border-gray-100">
                                    <div className="mb-5 border-l-4 border-[#fcd34d] pl-3">
                                        <p className="text-[11px] font-black text-gray-400 mb-1 uppercase">{itinerary[activeDay].date}</p>
                                        <h2 className="text-xl font-black text-[#1a2b4c] leading-tight">{itinerary[activeDay].title}</h2>
                                    </div>

                                    <div className="space-y-7 relative">
                                        <div className="absolute left-[1.1rem] top-2 bottom-2 w-[2px] bg-gray-100"></div>
                                        {itinerary[activeDay].items.map((item, idx) => (
                                            <div key={idx} className="relative pl-12 group">
                                                <div className="absolute left-0 top-0 w-10 h-10 bg-[#1a2b4c] text-white rounded-xl flex flex-col items-center justify-center z-10 shadow-md">
                                                    <span className="text-[12px] font-black leading-none">{item.time.split(':')[0]}</span>
                                                    <span className="text-[12px] font-black leading-none">{item.time.split(':')[1]}</span>
                                                </div>
                                                <div className="flex flex-col">
                                                    {item.loc ? (
                                                        <a href={getNaverMapUrl(item.loc)} target="_blank" rel="noopener noreferrer" className="text-[16px] font-black leading-snug tracking-tight flex items-center flex-wrap text-blue-700 underline decoration-blue-200 underline-offset-4 cursor-pointer active:text-blue-900">
                                                            {item.desc}
                                                            <i data-lucide="map-pin" className="w-3.5 h-3.5 ml-1.5 text-blue-400 shrink-0 inline-block"></i>
                                                        </a>
                                                    ) : (
                                                        <span className="text-[16px] font-black leading-snug tracking-tight flex items-center flex-wrap text-[#1a2b4c]">
                                                            {item.desc}
                                                        </span>
                                                    )}
                                                    {item.note && <p className="text-[12px] text-amber-700 font-bold mt-1.5 flex items-start leading-relaxed"><span className="text-amber-400 mr-1 shrink-0">✨</span>{item.note}</p>}
                                                    {item.taxi && (
                                                        <div className="mt-2.5 flex items-center gap-1.5 text-[10px] font-black text-blue-600 bg-blue-50 px-3 py-1.5 rounded-lg border border-blue-100 w-fit">
                                                            <i data-lucide="navigation" className="w-3 h-3 shrink-0"></i> {item.taxi}
                                                        </div>
                                                    )}
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        )}

                        {activeTab === 'taxi' && (
                            <div className="space-y-4">
                                <div className="bg-blue-50 p-4 rounded-xl border border-blue-100 flex items-start gap-2 mb-2">
                                    <i data-lucide="info" className="w-4 h-4 text-blue-600 flex-shrink-0 mt-0.5"></i>
                                    <p className="text-[11px] text-blue-800 font-bold">💡 點擊「小喇叭」播放語音；點擊「卡片」進入大字展示模式。</p>
                                </div>
                                {taxiNotes.map((note, idx) => (
                                    <div key={idx} onClick={() => setFullscreenNote(note)} className="bg-white rounded-2xl p-5 border border-gray-200 shadow-sm active:scale-95 transition-transform cursor-pointer relative">
                                        <p className="text-[10px] font-black text-gray-400 mb-3 uppercase tracking-widest">{note.t}</p>
                                        <div className="bg-[#1a2b4c] p-5 rounded-xl mb-3 shadow-inner relative overflow-hidden">
                                            <div className="absolute top-2 right-3 text-[#fcd34d] opacity-30 text-xs">✦</div>
                                            <p className="text-xl font-bold text-white text-center leading-relaxed pr-8">"{note.k}"</p>
                                            <button onClick={(e) => playKoreanVoice(note.k, e)} className="absolute right-3 top-1/2 transform -translate-y-1/2 p-2.5 bg-white/20 rounded-full hover:bg-white/30 active:scale-90 transition-all text-[#fcd34d]">
                                                <i data-lucide="volume-2" className="w-5 h-5"></i>
                                            </button>
                                        </div>
                                        <div className="flex justify-between items-center mt-2">
                                            <p className="text-sm text-gray-600 font-bold w-[85%]">{note.d}</p>
                                            <i data-lucide="chevron-right" className="w-4 h-4 text-gray-300"></i>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}

                        {activeTab === 'places' && (
                            <div className="space-y-4">
                                <div className="bg-emerald-50 p-4 rounded-xl border border-emerald-100 flex items-start gap-2 mb-2">
                                    <i data-lucide="map" className="w-4 h-4 text-emerald-600 flex-shrink-0 mt-0.5"></i>
                                    <p className="text-xs text-emerald-800 font-bold leading-relaxed">
                                        📍 行程中所有搭車地點。<br/>點擊右側 <span className="inline-block bg-white p-1 rounded shadow-sm mx-0.5"><i data-lucide="copy" className="w-3 h-3 text-emerald-600"></i></span> 可複製韓文地址給司機看或貼上地圖搜尋！
                                    </p>
                                </div>
                                
                                {placesData.map((place, idx) => (
                                    <div key={idx} className="bg-white rounded-2xl p-5 border border-gray-200 shadow-sm relative overflow-hidden">
                                        <p className="text-xs font-black text-[#1a2b4c] mb-3 border-b border-gray-100 pb-2 flex items-center gap-1.5">
                                            <span className="w-1.5 h-1.5 bg-[#fcd34d] rounded-full"></span>
                                            {place.cat}
                                        </p>
                                        <div className="space-y-1">
                                            <p className="text-base font-black text-[#1a2b4c]">
                                                {place.koName} <span className="text-sm text-gray-500 font-bold ml-1">({place.zhName})</span>
                                            </p>
                                            
                                            <div className="flex items-start gap-2 mt-2 pt-2 bg-gray-50 p-3 rounded-xl border border-gray-100">
                                                <div className="flex-1">
                                                    <p className="text-sm font-black text-gray-800 mb-0.5 select-all">{place.koAddr}</p>
                                                    <p className="text-[11px] font-bold text-gray-400 select-all leading-tight">({place.enAddr})</p>
                                                </div>
                                                <button onClick={() => copyToClipboard(place.koAddr)} className="p-2.5 bg-white border border-gray-200 rounded-xl shadow-sm hover:bg-gray-100 active:scale-90 transition-all shrink-0">
                                                    <i data-lucide="copy" className="w-4 h-4 text-[#1a2b4c]"></i>
                                                </button>
                                            </div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}

                        {activeTab === 'expense' && (
                            <div className="space-y-5">
                                <div className="bg-white rounded-2xl p-5 shadow-sm border border-gray-100">
                                    <div className="flex justify-between items-center mb-5">
                                        <h3 className="text-lg font-black text-[#1a2b4c] flex items-center gap-2"><i data-lucide="navigation" className="w-5 h-5 text-blue-500"></i> 🚕 交通/的士</h3>
                                        <button onClick={() => openExpenseModal('trans')} className="bg-[#1a2b4c] text-white p-2.5 rounded-xl shadow-md active:scale-95 transition-transform"><i data-lucide="plus" className="w-5 h-5"></i></button>
                                    </div>
                                    <div className="space-y-3">
                                        {transportEx.length === 0 && <p className="text-center text-gray-400 text-xs py-2">尚無紀錄</p>}
                                        {transportEx.map(item => (
                                            <div key={item.id} className="flex justify-between items-center bg-gray-50 p-4 rounded-xl border border-gray-100">
                                                <div className="flex flex-col">
                                                    <span className="text-[15px] font-bold text-gray-700">{item.desc}</span>
                                                    <span className="mt-1.5">{item.method ? getMethodBadge(item.method) : getMethodBadge('現金')}</span>
                                                </div>
                                                <div className="flex items-center gap-3">
                                                    <span className="text-base font-black text-blue-600">₩{item.cost.toLocaleString()}</span>
                                                    <button onClick={() => deleteExpense('trans', item.id)} className="text-red-400 p-1.5"><i data-lucide="trash-2" className="w-4 h-4"></i></button>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                                <div className="bg-white rounded-2xl p-5 shadow-sm border border-gray-100">
                                    <div className="flex justify-between items-center mb-5">
                                        <h3 className="text-lg font-black text-[#1a2b4c] flex items-center gap-2"><i data-lucide="shopping-bag" className="w-5 h-5 text-pink-500"></i> 🛍️ 購物/美食</h3>
                                        <button onClick={() => openExpenseModal('shop')} className="bg-pink-600 text-white p-2.5 rounded-xl shadow-md active:scale-95 transition-transform"><i data-lucide="plus" className="w-5 h-5"></i></button>
                                    </div>
                                    <div className="space-y-3">
                                        {shoppingEx.length === 0 && <p className="text-center text-gray-400 text-xs py-2">尚無紀錄</p>}
                                        {shoppingEx.map(item => (
                                            <div key={item.id} className="flex justify-between items-center bg-gray-50 p-4 rounded-xl border border-gray-100">
                                                <div className="flex flex-col">
                                                    <span className="text-[15px] font-bold text-gray-700">{item.desc}</span>
                                                    <span className="mt-1.5">{item.method ? getMethodBadge(item.method) : getMethodBadge('信用卡')}</span>
                                                </div>
                                                <div className="flex items-center gap-3">
                                                    <span className="text-base font-black text-pink-600">₩{item.cost.toLocaleString()}</span>
                                                    <button onClick={() => deleteExpense('shop', item.id)} className="text-red-400 p-1.5"><i data-lucide="trash-2" className="w-4 h-4"></i></button>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        )}

                        {activeTab === 'info' && (
                            <div className="space-y-5">
                                <div className="bg-white rounded-3xl p-6 shadow-sm border border-blue-50 relative overflow-hidden">
                                    <h3 className="text-lg font-black text-[#1a2b4c] flex items-center gap-2 mb-5 border-l-4 border-blue-400 pl-3">
                                        <i data-lucide="cloud-sun" className="w-5 h-5 text-blue-500"></i> 釜山即時天氣
                                    </h3>
                                    
                                    {weatherLoading ? (
                                        <p className="text-center text-sm text-gray-400 py-6">即時天氣載入中...</p>
                                    ) : weather ? (
                                        <div>
                                            <div className="flex items-center justify-between px-2 mb-3">
                                                <div>
                                                    <div className="flex items-baseline gap-1">
                                                        <span className="text-5xl font-black text-[#1a2b4c]">{weather.current.temperature_2m}°</span>
                                                        <span className="text-base font-bold text-gray-500">C</span>
                                                    </div>
                                                    <p className="text-xs font-bold text-gray-500 mt-1 pl-1">體感溫度 {weather.current.apparent_temperature}°C</p>
                                                </div>
                                                <div className="text-right">
                                                    <span className="text-5xl">{getWeatherInfo(weather.current.weather_code).icon}</span>
                                                    <p className="text-base font-black text-[#1a2b4c] mt-2">{getWeatherInfo(weather.current.weather_code).desc}</p>
                                                </div>
                                            </div>

                                            <div className="bg-indigo-50 p-4 rounded-2xl border border-indigo-100 my-5 flex gap-3 items-start">
                                                <i data-lucide="shirt" className="w-5 h-5 text-indigo-500 shrink-0 mt-0.5"></i>
                                                <div>
                                                    <p className="text-xs font-black text-indigo-800 uppercase mb-1">今日穿搭建議</p>
                                                    <p className="text-sm font-bold text-gray-700 leading-relaxed">
                                                        {getClothingSuggestion(weather.current.apparent_temperature)}
                                                    </p>
                                                </div>
                                            </div>

                                            <div className="mt-5 border-t border-gray-100 pt-5">
                                                <p className="text-xs font-black text-gray-400 uppercase mb-3 flex items-center justify-between">
                                                    <span>24 小時動態預報</span>
                                                    <span className="text-[10px] bg-blue-50 text-blue-500 px-2 py-1 rounded-full">左右滑動 👉</span>
                                                </p>
                                                <div className="flex overflow-x-auto no-scrollbar smooth-scroll gap-3 pb-3">
                                                    {(() => {
                                                        let startIndex = weather.hourly.time.findIndex(t => t >= weather.current.time);
                                                        if (startIndex === -1) startIndex = 0;
                                                        
                                                        const hourlyData = [];
                                                        for(let i = 0; i < 24; i++) {
                                                            let idx = startIndex + i;
                                                            if (idx < weather.hourly.time.length) {
                                                                hourlyData.push({
                                                                    time: weather.hourly.time[idx].slice(11, 16),
                                                                    temp: weather.hourly.temperature_2m[idx],
                                                                    code: weather.hourly.weather_code[idx],
                                                                    precip: weather.hourly.precipitation_probability[idx]
                                                                });
                                                            }
                                                        }

                                                        return hourlyData.map((h, i) => {
                                                            const info = getWeatherInfo(h.code);
                                                            return (
                                                                <div key={i} className="flex flex-col items-center justify-center shrink-0 w-[65px] bg-blue-50/50 rounded-2xl p-3 border border-blue-100/50">
                                                                    <span className="text-[11px] font-black text-gray-500">{i === 0 ? '現在' : h.time}</span>
                                                                    <span className="text-3xl my-2">{info.icon}</span>
                                                                    <span className="text-base font-black text-[#1a2b4c]">{h.temp}°</span>
                                                                    <div className="text-[10px] font-black text-blue-500 mt-1 flex items-center gap-0.5 bg-white px-2 py-0.5 rounded-md shadow-sm">
                                                                        💧 {h.precip}%
                                                                    </div>
                                                                </div>
                                                            )
                                                        });
                                                    })()}
                                                </div>
                                            </div>

                                            <div className="space-y-3 mt-5 border-t border-gray-100 pt-5">
                                                <p className="text-xs font-black text-gray-400 uppercase mb-2">5 Days Forecast</p>
                                                {weather.daily.time.slice(0, 5).map((date, idx) => {
                                                    const info = getWeatherInfo(weather.daily.weather_code[idx]);
                                                    return (
                                                        <div key={idx} className="flex justify-between items-center bg-gray-50 p-3 rounded-xl border border-gray-100">
                                                            <span className="text-sm font-black text-gray-700 w-16">{date.slice(5).replace('-','/')}</span>
                                                            <div className="flex items-center gap-3 w-24">
                                                                <span className="text-2xl">{info.icon}</span>
                                                                {info.umbrella && <span className="bg-blue-100 text-blue-600 text-[10px] px-2 py-0.5 rounded font-black">帶傘☔</span>}
                                                            </div>
                                                            <div className="flex gap-2 text-sm font-black">
                                                                <span className="text-red-500">{weather.daily.temperature_2m_max[idx]}°</span>
                                                                <span className="text-gray-300">/</span>
                                                                <span className="text-blue-500">{weather.daily.temperature_2m_min[idx]}°</span>
                                                            </div>
                                                        </div>
                                                    );
                                                })}
                                            </div>
                                        </div>
                                    ) : (
                                        <p className="text-center text-sm text-red-400 py-4">無法取得天氣資訊</p>
                                    )}
                                </div>

                                <div className="bg-white rounded-3xl p-6 shadow-sm border border-gray-100">
                                    <h3 className="text-lg font-black text-[#1a2b4c] flex items-center gap-2 mb-5 border-l-4 border-[#fcd34d] pl-3">
                                        <i data-lucide="info" className="w-5 h-5 text-[#fcd34d]"></i> 韓國實用資訊
                                    </h3>
                                    <div className="space-y-4">
                                        <div className="bg-red-50 p-4 rounded-xl border border-red-100">
                                            <p className="text-xs font-black text-red-500 uppercase mb-2">緊急聯絡</p>
                                            <div className="flex justify-between text-base font-bold text-[#1a2b4c]">
                                                <span>報警: <a href="tel:112" className="text-red-600">112</a></span>
                                                <span>救護/消防: <a href="tel:119" className="text-red-600">119</a></span>
                                            </div>
                                            <div className="mt-2 text-base font-bold text-[#1a2b4c]">
                                                旅遊翻譯熱線: <a href="tel:1330" className="text-blue-600">1330</a> (24H)
                                            </div>
                                        </div>
                                        <div className="bg-amber-50 p-4 rounded-xl border border-amber-100">
                                            <p className="text-xs font-black text-amber-600 uppercase mb-2">退稅指南 (Tax Free)</p>
                                            <p className="text-sm font-bold text-gray-800 leading-relaxed">
                                                • 單筆消費滿 <strong className="text-red-500">15,000 韓元</strong> 即可退稅。<br/>
                                                • 市區/即時退稅單筆上限 <strong className="text-blue-600">100萬韓元</strong>。<br/>
                                                • 結帳時請主動出示護照並說："Tax Free, please"。
                                            </p>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {activeTab === 'phrase' && (
                            <div className="space-y-4">
                                <div className="bg-[#fcd34d]/20 p-4 rounded-xl border border-[#fcd34d]/50 flex items-start gap-2 mb-2">
                                    <i data-lucide="message-circle" className="w-5 h-5 text-amber-600 flex-shrink-0 mt-0.5"></i>
                                    <p className="text-xs text-amber-900 font-bold leading-relaxed">🗣️ 帶著長輩不慌張！點擊喇叭發聲，或點擊卡片全螢幕展示給店員看。</p>
                                </div>
                                {koreanPhrases.map((note, idx) => (
                                    <div key={idx} onClick={() => setFullscreenNote(note)} className="bg-white rounded-2xl p-5 border border-gray-200 shadow-sm active:scale-95 transition-transform cursor-pointer relative">
                                        <p className="text-[11px] font-black text-gray-400 mb-3 tracking-widest">{note.t}</p>
                                        <div className="bg-[#1a2b4c] p-5 rounded-xl mb-3 shadow-inner relative overflow-hidden">
                                            <p className="text-xl font-bold text-white text-center leading-relaxed pr-8">"{note.k}"</p>
                                            <button onClick={(e) => playKoreanVoice(note.k, e)} className="absolute right-3 top-1/2 transform -translate-y-1/2 p-2.5 bg-white/20 rounded-full hover:bg-white/30 active:scale-90 transition-all text-[#fcd34d]">
                                                <i data-lucide="volume-2" className="w-5 h-5"></i>
                                            </button>
                                        </div>
                                        <p className="text-[13px] text-blue-800 font-bold w-[90%]">{note.d}</p>
                                    </div>
                                ))}
                            </div>
                        )}
                    </div>

                    <div className="fixed bottom-0 left-0 right-0 z-[100] shadow-[0_-5px_15px_rgba(0,0,0,0.05)]">
                        <div className="bg-[#1a2b4c] px-5 py-2 flex justify-between items-center border-t border-[#1a2b4c]">
                            <div className="flex items-center gap-2">
                                <span className="text-[10px] font-black text-white/60 uppercase tracking-widest">Total</span>
                                <span className="text-base font-black text-white tracking-tight">₩{totalAll.toLocaleString()}</span>
                            </div>
                            <div className="flex items-baseline gap-2">
                                <span className="text-[10px] font-black text-[#fcd34d]/80 uppercase tracking-widest">HKD</span>
                                <span className="text-base font-black text-[#fcd34d] tracking-tight">${(totalAll/185).toFixed(0)}</span>
                            </div>
                        </div>
                        
                        <div className="h-[60px] bg-white flex items-center justify-around border-t border-gray-200 px-1 pb-1">
                            <button onClick={() => setActiveTab('itinerary')} className={`flex flex-col items-center gap-1 flex-1 ${activeTab === 'itinerary' ? 'text-[#1a2b4c]' : 'text-gray-400'}`}>
                                <i data-lucide="calendar" className="w-5 h-5"></i><span className="text-[10px] font-black">行程</span>
                            </button>
                            <button onClick={() => setActiveTab('taxi')} className={`flex flex-col items-center gap-1 flex-1 ${activeTab === 'taxi' ? 'text-[#1a2b4c]' : 'text-gray-400'}`}>
                                <i data-lucide="navigation" className="w-5 h-5"></i><span className="text-[10px] font-black">的士</span>
                            </button>
                            <button onClick={() => setActiveTab('places')} className={`flex flex-col items-center gap-1 flex-1 ${activeTab === 'places' ? 'text-[#1a2b4c]' : 'text-gray-400'}`}>
                                <i data-lucide="map-pin" className="w-5 h-5"></i><span className="text-[10px] font-black">地點</span>
                            </button>
                            <button onClick={() => setActiveTab('expense')} className={`flex flex-col items-center gap-1 flex-1 ${activeTab === 'expense' ? 'text-[#1a2b4c]' : 'text-gray-400'}`}>
                                <i data-lucide="credit-card" className="w-5 h-5"></i><span className="text-[10px] font-black">記帳</span>
                            </button>
                            <button onClick={() => setActiveTab('info')} className={`flex flex-col items-center gap-1 flex-1 ${activeTab === 'info' ? 'text-[#1a2b4c]' : 'text-gray-400'}`}>
                                <i data-lucide="cloud-sun" className="w-5 h-5"></i><span className="text-[10px] font-black">天氣</span>
                            </button>
                            <button onClick={() => setActiveTab('phrase')} className={`flex flex-col items-center gap-1 flex-1 ${activeTab === 'phrase' ? 'text-[#1a2b4c]' : 'text-gray-400'}`}>
                                <i data-lucide="message-circle" className="w-5 h-5"></i><span className="text-[10px] font-black">韓語</span>
                            </button>
                        </div>
                    </div>

                    {showModal && (
                        <div className="fixed inset-0 bg-[#1a2b4c]/80 backdrop-blur-sm z-[400] flex items-center justify-center p-5 animate-in fade-in duration-200">
                            <div className="bg-white w-full max-w-sm rounded-3xl p-6 shadow-2xl animate-in zoom-in duration-200">
                                <h3 className="text-xl font-black text-[#1a2b4c] mb-6">
                                    {expenseType === 'trans' ? '🚕 新增交通支出' : '🛍️ 新增購物美食'}
                                </h3>
                                <div className="space-y-4">
                                    <div>
                                        <label className="text-xs font-black text-gray-400 uppercase mb-2 block">項目名稱</label>
                                        <input type="text" value={expenseDesc} onChange={e => setExpenseDesc(e.target.value)} placeholder="輸入項目..." className="w-full bg-gray-50 border border-gray-200 rounded-xl px-4 py-3 text-base font-bold text-gray-800 focus:outline-none focus:border-[#1a2b4c]" />
                                    </div>
                                    <div>
                                        <label className="text-xs font-black text-gray-400 uppercase mb-2 block">金額 (KRW)</label>
                                        <input type="number" value={expenseCost} onChange={e => setExpenseCost(e.target.value)} placeholder="0" className="w-full bg-gray-50 border border-gray-200 rounded-xl px-4 py-3 text-xl font-black text-[#1a2b4c] focus:outline-none focus:border-[#1a2b4c]" />
                                    </div>
                                    <div>
                                        <label className="text-xs font-black text-gray-400 uppercase mb-2 block">付款方式</label>
                                        <div className="flex gap-2">
                                            {['現金', '信用卡', 'WOWPASS'].map(method => (
                                                <button 
                                                    key={method} 
                                                    onClick={() => setPaymentMethod(method)}
                                                    className={`flex-1 py-2.5 rounded-xl text-xs font-black border transition-colors ${paymentMethod === method ? 'bg-blue-50 border-blue-400 text-blue-700' : 'bg-white border-gray-200 text-gray-400'}`}
                                                >
                                                    {method}
                                                </button>
                                            ))}
                                        </div>
                                    </div>
                                </div>
                                <div className="flex gap-3 mt-8">
                                    <button onClick={() => setShowModal(false)} className="flex-1 py-3.5 bg-gray-100 text-gray-600 rounded-xl font-black text-sm">取消</button>
                                    <button onClick={saveExpense} className={`flex-1 py-3.5 text-white rounded-xl font-black text-sm ${expenseType === 'trans' ? 'bg-[#1a2b4c]' : 'bg-pink-600'}`}>儲存紀錄</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {fullscreenNote && (
                        <div className="fixed inset-0 bg-[#1a2b4c] z-[300] flex flex-col items-center justify-center p-8" onClick={() => setFullscreenNote(null)}>
                            <div className="absolute inset-0 overflow-hidden pointer-events-none">
                                {[...Array(20)].map((_, i) => (
                                    <div key={`modal-star-${i}`} className="absolute text-[#fcd34d] star-twinkle opacity-50" style={{ top: `${Math.random() * 100}%`, left: `${Math.random() * 100}%`, fontSize: `${Math.random() * 10 + 5}px`, animationDelay: `${Math.random() * 2}s`, animationDuration: `${Math.random() * 3 + 2}s` }}>✦</div>
                                ))}
                            </div>
                            <button className="absolute top-8 right-8 p-4 text-white/50 z-20"><i data-lucide="x" className="w-10 h-10"></i></button>
                            <div className="w-full text-center space-y-10 z-10">
                                <p className="text-[#fcd34d] text-xl font-black tracking-widest uppercase">{fullscreenNote.t}</p>
                                <div className="bg-white/10 rounded-3xl p-10 border border-white/20 backdrop-blur-md shadow-2xl">
                                    <p className="text-4xl font-black text-white leading-snug break-words">{fullscreenNote.k}</p>
                                </div>
                                <button onClick={(e) => playKoreanVoice(fullscreenNote.k, e)} className="mx-auto flex items-center justify-center gap-3 bg-[#fcd34d] text-[#1a2b4c] px-8 py-4 rounded-full font-black text-xl shadow-lg active:scale-95 transition-transform">
                                    <i data-lucide="volume-2" className="w-6 h-6"></i> 播放語音給對方聽
                                </button>
                                <p className="text-gray-300 text-xl font-bold">{fullscreenNote.d}</p>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
